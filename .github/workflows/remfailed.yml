      - name: Ambil dan Hapus Log Gagal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Memulai pencarian alur kerja yang gagal..."
          
          # Mengubah --status failed menjadi --status failure
          RUNS=$(gh run list --repo "${{ github.repository }}" --status failure --limit 100 --json databaseId --jq '.[].databaseId')
          
          if [ -z "$RUNS" ]; then
            echo "✅ Tidak ada alur kerja berstatus gagal (failure) yang ditemukan."
            exit 0
          fi

          echo "Daftar ID yang akan dihapus:"
          echo "$RUNS"
          echo "-----------------------------------"

          # Melakukan perulangan untuk menghapus setiap ID secara bergantian
          for RUN_ID in $RUNS; do
            echo "🔄 Menghapus Run ID: $RUN_ID"
            gh run delete "$RUN_ID" --repo "${{ github.repository }}"
          done
          
          echo "🎉 Proses pembersihan selesai!"
